<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextShop Admin Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], },
                    colors: {
                        brand: { 500: '#14b8a6', 600: '#0d9488' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 font-sans antialiased text-gray-900 h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background element -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-500/20 rounded-full blur-3xl -z-10"></div>

    <div class="fixed top-4 right-4 z-50">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-white border-l-4 {% if category == 'success' %}border-green-500 text-green-700{% else %}border-red-500 text-red-700{% endif %} p-4 rounded shadow-lg mb-2 flex items-center justify-between min-w-[300px]">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                            <span>{{ message }}</span>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 z-10 relative">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gray-900 text-brand-500 rounded-xl flex items-center justify-center text-3xl font-bold mx-auto mb-4 shadow-lg shadow-brand-500/30">N</div>
            <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to manage NextShop</p>
        </div>

        <form action="/admin/login" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" name="username" required class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" name="password" required class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
                </div>
            </div>
            <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 mt-4 shadow-md">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        <div class="mt-8 text-center pt-6 border-t border-gray-100">
            <a href="/" class="text-sm text-gray-500 hover:text-brand-600 transition-colors font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Website</a>
        </div>
    </div>
</body>
</html>
